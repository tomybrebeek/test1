<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SMILES Structure Viewer</title>
  <!-- Include Kekule.js library -->
  <script src="https://unpkg.com/kekule/dist/kekule.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    #structure {
      border: 1px solid #ccc;
      width: 600px;
      height: 400px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>SMILES Structure Viewer</h1>
  <label for="smilesInput">Enter SMILES string:</label>
  <input type="text" id="smilesInput" value="CC" size="20" />
  <button id="drawBtn">Draw Structure</button>

  <div id="structure"></div>

  <script>
    document.getElementById('drawBtn').addEventListener('click', () => {
      const smiles = document.getElementById('smilesInput').value;
      const container = document.getElementById('structure');
      // Clear previous diagram
      container.innerHTML = '';

      // Create a Kekule Renderer
      const renderer = new Kekule.Render.Html5CanvasRenderer(container, {width: 600, height: 400});
      
      // Parse the SMILES string
      const mol = Kekule.IO.loadFormatData(smiles, 'smi');
      
      // Create a Kekule.StructureFragment for display
      const structure = new Kekule.StructureFragment();
      structure.append(mol);
      
      // Render the molecule
      renderer.setChemObj(mol);
      renderer.draw();
    });
  </script>
</body>
</html>
