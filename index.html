<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SMILES Structure Viewer</title>
  <!-- Include Kekule.js library -->
  <script src="https://unpkg.com/kekule/dist/kekule.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    #structure {
      border: 1px solid #ccc;
      width: 600px;
      height: 400px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>SMILES Structure Viewer</h1>
  <label for="smilesInput">Enter SMILES string:</label>
  <input type="text" id="smilesInput" value="CC" size="20" />
  <button id="drawBtn">Draw Structure</button>

  <div id="structure"></div>

  <script>
    document.getElementById('drawBtn').addEventListener('click', () => {
      const smiles = document.getElementById('smilesInput').value;
      const container = document.getElementById('structure');
      
      // Clear previous diagram
      container.innerHTML = '';

      // Create a Kekule ChemWidget Viewer's container
      const viewer = new Kekule.ChemWidget.Viewer(container, {
        width: 600,
        height: 400
      });

      // Load molecule asynchronously
      Kekule.IO.loadFormatData(smiles, 'smi').then(mol => {
        // Set the molecule into the viewer
        viewer.setChemObject(mol);
      }).catch(error => {
        alert('Error parsing SMILES: ' + error);
      });
    });
  </script>
</body>
</html>
