<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Organic Molecule Generator</title>
<script src="https://unpkg.com/kekule/dist/kekule.js"></script>
</head>
<body>
<h1>Organic Molecule</h1>
<div id="structure" style="width: 400px; height: 400px; border: 1px solid #ccc;"></div>

<script>
  // Initialize Kekule Structure Viewer
  const viewer = new Kekule.ChemWidget.Viewer(document.getElementById('structure'), { 
    // options
  });
  
  // Example SMILES string for Ethanol
  const smiles = 'CCO';

  // Convert SMILES to structure
  const mol = Kekule.IO.loadFormatData(smiles, 'smiles');

  // Display molecule
  viewer.setChemObj(mol);
</script>
</body>
</html>
